<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: black; margin: 0; overflow: hidden; color: white; }
        
        .container { 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            height: 100vh; 
        }
        
        .banner { 
            width: 1000px; 
            height: 250px; 
            display: flex; 
            align-items: center; 
            padding: 0 60px; 
            position: relative; 
            will-change: transform;
        }

        .fuzzy {
            mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
        }

        /* BANNER COLORS & ANIMATION SPEEDS */
        .time-banner {
            background: radial-gradient(circle, rgba(0,119,190,0.9) 0%, rgba(0,119,190,0) 85%);
            font-family: 'Montserrat', sans-serif; 
            color: #00e5ff;
            animation: flyLeft 18s ease-in-out infinite alternate;
            order: 1;
        }
        .time-banner .content { font-size: 8rem; } /* Extra Large Clock */

        .weather-banner {
            background: radial-gradient(circle, rgba(255,140,0,0.7) 0%, rgba(255,140,0,0) 85%);
            font-family: 'Montserrat', sans-serif; 
            color: #ffb74d;
            animation: flyRight 14s ease-in-out infinite alternate;
            order: 2;
        }

        .upcoming-banner {
            background: radial-gradient(circle, rgba(155, 89, 182, 0.7) 0%, rgba(155, 89, 182, 0) 85%);
            font-family: 'Montserrat', sans-serif;
            color: #e1bee7;
            animation: flyLeft 20s ease-in-out infinite alternate;
            order: 3;
        }

        /* Movement Logic - Tightened to reduce "off-screen" time */
        @keyframes flyLeft { 
            from { transform: translateX(-1050px); } 
            to { transform: translateX(100vw); } 
        }

        @keyframes flyRight { 
            from { transform: translateX(100vw); } 
            to { transform: translateX(-1050px); } 
        }

        .label { 
            font-size: 1.8rem; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            font-weight: 800; 
            opacity: 0.7; 
            display: block; 
            margin-bottom: 5px; 
        }
        
        .content { 
            font-size: 4rem; 
            text-shadow: 2px 2px 25px rgba(0,0,0,0.9); 
            line-height: 1.1; 
            font-weight: 800; 
            white-space: nowrap;
            transition: opacity 1s ease-in-out; /* For the Calendar fade */
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="banner time-banner fuzzy" id="time-slot">
        <div><span class="label">Current Time</span><div class="content" id="clock">00:00:00</div></div>
    </div>
    <div class="banner weather-banner fuzzy" id="weather-slot">
        <div><span class="label">Vancouver, WA</span><div class="content" id="weather">Loading...</div></div>
    </div>
    <div class="banner upcoming-banner fuzzy" id="event-slot">
        <div><span class="label">Calendar Feed</span><div class="content" id="event">Loading Schedule...</div></div>
    </div>
</div>

<script>
    // --- Clock ---
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit', second:'2-digit'});
    }

    // --- Weather ---
    async function getWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.6387&longitude=-122.6615&current_weather=true&temperature_unit=fahrenheit');
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            document.getElementById('weather').innerText = temp + "°F - Vancouver";
        } catch (error) {
            document.getElementById('weather').innerText = "Weather Unavailable";
        }
    }

    // --- Calendar Fade Logic ---
    const events = ["Camino Departure: Aug 21", "Cali for the 4th", "Retirement Milestone: Aug 2031"];
    let eventIdx = 0;
    function cycleEvents() {
        const el = document.getElementById('event');
        el.style.opacity = 0; // Fade Out
        setTimeout(() => {
            eventIdx = (eventIdx + 1) % events.length;
            el.innerText = events[eventIdx];
            el.style.opacity = 1; // Fade In
        }, 1200); // Wait for fade out to finish before changing text
    }

    // --- Position Shifting (Clock moves positions) ---
    let positionState = 1; 
    const timeBanner = document.getElementById('time-slot');
    const weatherBanner = document.getElementById('weather-slot');
    const eventBanner = document.getElementById('event-slot');

    function shiftPosition() {
        positionState = (positionState % 3) + 1;
        if (positionState === 1) {
            timeBanner.style.order = 1;
            weatherBanner.style.order = 2;
            eventBanner.style.order = 3;
        } else if (positionState === 2) {
            timeBanner.style.order = 2;
            weatherBanner.style.order = 3;
            eventBanner.style.order = 1;
        } else {
            timeBanner.style.order = 3;
            weatherBanner.style.order = 1;
            eventBanner.style.order = 2;
        }
    }

    // Shifting interval - roughly matches the movement cycle
    setInterval(shiftPosition, 25000);

    setInterval(updateTime, 1000);
    setInterval(cycleEvents, 10000); // Changes text every 10 seconds
    setInterval(getWeather, 600000); 
    
    updateTime();
    getWeather();
    document.getElementById('event').innerText = events[0];
</script>

</body>
</html>
