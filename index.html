<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: black; margin: 0; overflow: hidden; color: white; }
        .container { display: flex; flex-direction: column; justify-content: space-around; height: 100vh; position: relative; }
        
        .banner { 
            width: 900px; 
            height: 220px; 
            display: flex; 
            align-items: center; 
            padding: 0 60px; 
            position: absolute;
            /* Stronger backgrounds so you can see the banners clearly */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            will-change: transform, opacity;
        }

        .time-banner {
            top: 10%;
            background: radial-gradient(circle at center, rgba(0,229,255,0.6) 0%, rgba(0,80,120,0.9) 100%);
            color: #00e5ff;
            animation: flyShatterLeft 25s linear infinite;
        }

        .weather-banner {
            top: 40%;
            background: radial-gradient(circle at center, rgba(255,183,77,0.6) 0%, rgba(200,100,0,0.9) 100%);
            color: #ffb74d;
            animation: flyShatterRight 28s linear infinite;
        }

        .upcoming-banner {
            top: 70%;
            background: radial-gradient(circle at center, rgba(225,190,231,0.6) 0%, rgba(100, 40, 150, 0.9) 100%);
            color: #e1bee7;
            animation: flyShatterLeft 30s linear infinite;
        }

        /* Movement */
        @keyframes flyShatterLeft {
            0% { transform: translateX(-1000px); opacity: 1; }
            90% { transform: translateX(calc(100vw - 300px)); opacity: 1; }
            95% { transform: translateX(calc(100vw + 100px)); opacity: 0; }
            100% { transform: translateX(calc(100vw + 500px)); opacity: 0; }
        }

        @keyframes flyShatterRight {
            0% { transform: translateX(100vw); opacity: 1; }
            90% { transform: translateX(150px); opacity: 1; }
            95% { transform: translateX(-200px); opacity: 0; }
            100% { transform: translateX(-1000px); opacity: 0; }
        }

        /* Large Glass Shard Styles */
        .glass-shard {
            position: absolute;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.15);
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            will-change: transform, opacity;
            z-index: 999;
        }

        @keyframes floatShard {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; }
        }

        .label { font-size: 2rem; text-transform: uppercase; letter-spacing: 6px; font-weight: 800; opacity: 0.9; display: block; margin-bottom: 10px; }
        .content { font-size: 4.3rem; text-shadow: 2px 2px 30px rgba(0,0,0,1); line-height: 1.1; font-weight: 800; }
        #event { transition: opacity 1s ease-in-out; }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="banner time-banner">
        <div><span class="label">Current Time</span><div class="content" id="clock">00:00:00</div></div>
    </div>
    <div class="banner weather-banner">
        <div><span class="label">Vancouver, WA</span><div class="content" id="weather">Loading...</div></div>
    </div>
    <div class="banner upcoming-banner">
        <div><span class="label">Calendar Feed</span><div class="content" id="event">Loading...</div></div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit', second:'2-digit'});
    }

    async function getWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.6387&longitude=-122.6615&current_weather=true&temperature_unit=fahrenheit');
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            document.getElementById('weather').innerText = temp + "°F - Vancouver";
        } catch (error) {
            document.getElementById('weather').innerText = "Weather Unavailable";
        }
    }

    const events = ["Camino Departure: Aug 21", "Cali for the 4th", "Retirement Milestone: Aug 2031"];
    let eventIdx = 0;
    const eventElement = document.getElementById('event');

    function cycleEvents() {
        eventElement.style.opacity = 0;
        setTimeout(() => {
            eventIdx = (eventIdx + 1) % events.length;
            eventElement.innerText = events[eventIdx];
            eventElement.style.opacity = 1;
        }, 1000);
    }

    // New Large Clear Glass Shard Logic
    function createImpactShards(x, y) {
        for (let i = 0; i < 8; i++) {
            const shard = document.createElement('div');
            shard.className = 'glass-shard';
            
            // Random large jagged shapes
            const w = Math.random() * 100 + 50;
            const h = Math.random() * 100 + 50;
            shard.style.width = w + 'px';
            shard.style.height = h + 'px';
            
            // Random sharp angles using clip-path
            shard.style.clipPath = `polygon(${Math.random()*20}% ${Math.random()*20}%, ${80+Math.random()*20}% ${Math.random()*20}%, ${50+Math.random()*50}% ${80+Math.random()*20}%, ${Math.random()*20}% ${80+Math.random()*20}%)`;
            
            shard.style.left = x + 'px';
            shard.style.top = y + 'px';

            // Shards fly "inward" from the impact point
            const tx = (x > window.innerWidth / 2) ? -(Math.random() * 600) : (Math.random() * 600);
            const ty = (Math.random() - 0.5) * 400;
            const tr = (Math.random() - 0.5) * 500;
            
            shard.style.setProperty('--tx', `${tx}px`);
            shard.style.setProperty('--ty', `${ty}px`);
            shard.style.setProperty('--tr', `${tr}deg`);
            shard.style.animation = `floatShard ${Math.random() * 3 + 2}s cubic-bezier(0.16, 1, 0.3, 1) forwards`;

            document.getElementById('mainContainer').appendChild(shard);
            setTimeout(() => shard.remove(), 5000);
        }
    }

    function checkShatter() {
        const banners = document.querySelectorAll('.banner');
        banners.forEach(b => {
            const rect = b.getBoundingClientRect();
            // Check if banner is hitting the far edges
            if (rect.right > window.innerWidth - 50 && rect.right < window.innerWidth) {
                createImpactShards(window.innerWidth - 20, rect.top + rect.height/2);
            } else if (rect.left < 50 && rect.left > 0) {
                createImpactShards(20, rect.top + rect.height/2);
            }
        });
    }

    setInterval(updateTime, 1000);
    setInterval(cycleEvents, 10000);
    setInterval(getWeather, 600000);
    setInterval(checkShatter, 500); // Faster check for precise impact
    
    updateTime();
    getWeather();
    eventElement.innerText = events[0]; 
</script>
</body>
</html>
