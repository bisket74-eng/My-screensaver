<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambient Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: black; 
            margin: 0; 
            overflow: hidden; 
            color: white; 
            font-family: 'Montserrat', sans-serif;
        }
        
        .container { 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            height: 100vh; 
            padding: 20px 0;
        }
        
        .banner { 
            width: 2400px; /* Increased width for longer glow trails */
            height: 250px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: absolute; 
            will-change: transform; 
            text-align: center;
        }

        /* Edge fading effect - sharpened slightly for better contrast */
        .fuzzy {
            mask-image: linear-gradient(to right, rgba(0,0,0,0) 5%, rgba(0,0,0,1) 25%, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 95%);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0) 5%, rgba(0,0,0,1) 25%, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 95%);
        }

        /* BRIGHTER GRADIENTS: Increased alpha from 0.4 to 0.8 and adjusted color stops */
        .time-banner {
            background: radial-gradient(circle, rgba(0, 229, 255, 0.8) 0%, rgba(0, 119, 190, 0.3) 40%, rgba(0, 0, 0, 0) 80%);
            color: #00f2ff; /* Sharper cyan */
            top: 10%;
            animation: flyLeft 18s linear infinite;
        }

        .weather-banner {
            background: radial-gradient(circle, rgba(255, 140, 0, 0.8) 0%, rgba(255, 69, 0, 0.3) 40%, rgba(0, 0, 0, 0) 80%);
            color: #ff9d00; /* Richer orange */
            top: 40%;
            animation: flyRight 22s linear infinite;
        }

        .upcoming-banner {
            background: radial-gradient(circle, rgba(224, 64, 251, 0.8) 0%, rgba(106, 27, 154, 0.3) 40%, rgba(0, 0, 0, 0) 80%);
            color: #f38aff; /* Neon Purple/Pink */
            top: 70%;
            animation: flyLeft 20s linear infinite;
        }

        /* Using Transform for GPU acceleration - no more jitter */
        @keyframes flyLeft { 
            from { transform: translateX(-100%); } 
            to { transform: translateX(100vw); } 
        }

        @keyframes flyRight { 
            from { transform: translateX(100vw); } 
            to { transform: translateX(-100%); } 
        }
        
        #event, #weather, #clock { transition: opacity 0.8s ease-in-out; }

        .label { 
            font-size: 1.6rem; 
            text-transform: uppercase; 
            letter-spacing: 10px; 
            font-weight: 400; 
            opacity: 0.9; 
            display: block; 
            margin-bottom: 8px; 
        }
        
        .content { 
            font-size: 5rem; 
            text-shadow: 0px 0px 40px rgba(0,0,0,0.8); 
            line-height: 1.1; 
            font-weight: 800; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner time-banner fuzzy">
        <div>
            <span class="label">The Now</span>
            <div class="content" id="clock">--:--</div>
        </div>
    </div>

    <div class="banner weather-banner fuzzy">
        <div>
            <span class="label">The Weather</span>
            <div class="content" id="weather">Loading...</div>
        </div>
    </div>

    <div class="banner upcoming-banner fuzzy">
        <div>
            <span class="label">The Future</span>
            <div class="content" id="event">...</div>
        </div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit'});
    }

    // Helper to turn weather codes into words
    function getWeatherDesc(code) {
        if (code <= 3) return "Clear";
        if (code <= 48) return "Foggy";
        if (code <= 67) return "Rainy";
        if (code <= 77) return "Snowy";
        if (code <= 99) return "Stormy";
        return "Vancouver";
    }

    async function getWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.6387&longitude=-122.6615&current_weather=true&temperature_unit=fahrenheit');
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            const desc = getWeatherDesc(data.current_weather.weathercode);
            
            const weatherEl = document.getElementById('weather');
            weatherEl.style.opacity = 0;
            setTimeout(() => {
                weatherEl.innerText = `${temp}°F ${desc}`;
                weatherEl.style.opacity = 1;
            }, 800);
        } catch (error) {
            document.getElementById('weather').innerText = "Offline";
        }
    }

    const events = ["Cali for the 4th","NWEF July 15","My Camino Aug 21", "Retiring Aug 2031"];
    let i = 0;
    const eventElement = document.getElementById('event');

    function cycleEvents() {
        eventElement.style.opacity = 0;
        setTimeout(() => {
            i = (i + 1) % events.length;
            eventElement.innerText = events[i];
            eventElement.style.opacity = 1;
        }, 800);
    }

    // Intervals
    setInterval(updateTime, 1000);
    setInterval(cycleEvents, 12000); // Slower cycle to match long animations
    setInterval(getWeather, 600000); 
    
    // Init
    updateTime();
    getWeather();
    eventElement.innerText = events[0]; 
</script>

</body>
</html>
