<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Montserrat:wght@500&family=Raleway:wght@600&display=swap" rel="stylesheet">
    <style>
        body { background: black; margin: 0; overflow: hidden; color: white; }
        .container { display: flex; flex-direction: column; justify-content: space-around; height: 100vh; }
        
        .banner { 
            width: 800px; 
            height: 180px; 
            display: flex; 
            align-items: center; 
            padding: 0 60px; 
            position: relative; 
        }

        .fuzzy {
            mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
        }

        .time-banner {
            background: radial-gradient(circle, rgba(0,119,190,0.8) 0%, rgba(0,119,190,0) 85%);
            font-family: 'Montsurrat', sans-serif; color: #00e5ff;
            animation: flyLeft 10s ease-in-out infinite alternate;
        }

        .weather-banner {
            background: radial-gradient(circle, rgba(255,140,0,0.8) 0%, rgba(255,140,0,0) 85%);
            font-family: 'Montserrat', sans-serif; color: #ffb74d;
            align-self: flex-end;
            animation: flyRight 12s ease-in-out infinite alternate;
        }

        .upcoming-banner {
            background: radial-gradient(circle, rgba(155, 89, 182, 0.8) 0%, rgba(155, 89, 182, 0) 85%);
            font-family: 'Montsurrat', sans-serif; color: #e1bee7;
            animation: flyLeft 11s ease-in-out infinite alternate, pulse 4s infinite alternate;
        }

        /* Smooth transition for the event text */
        #event {
            transition: opacity 1s ease-in-out;
            opacity: 1;
        }

        @keyframes flyLeft { from { left: -750px; } to { left: calc(100vw - 100px); } }
        @keyframes flyRight { from { right: -750px; } to { right: calc(100vw - 100px); } }
        @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }

        .label { font-size: 1rem; text-transform: uppercase; letter-spacing: 4px; opacity: 0.75; display: block; margin-bottom: 8px; }
        .content { font-size: 2.8rem; text-shadow: 2px 2px 20px rgba(0,0,0,0.8); line-height: 1.1; }
    </style>
</head>
<body>
<div class="container">
    <div class="banner time-banner fuzzy">
        <div><span class="label">Current Time</span><div class="content" id="clock">00:00:00</div></div>
    </div>
    <div class="banner weather-banner fuzzy">
        <div><span class="label">Vancouver, WA</span><div class="content">68°F - Mostly Cloudy</div></div>
    </div>
    <div class="banner upcoming-banner fuzzy">
        <div><span class="label">Calendar Feed</span><div class="content" id="event">Loading Schedule...</div></div>
    </div>
</div>
<script>
    function updateTime() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }
    
    const events = [
        "Camino Departure: Aug 21",
        "Trek Planning: Late Aug",
        "Retirement Milestone: Aug 2031"
    ];
    let i = 0;
    const event element = document.getElementById('event');

    function cycleEvents() {
        // Step 1: Fade out
        eventElement.style.opacity = 0;
        
        // Step 2: Wait for fade out, then swap text and fade in
        setTimeout(() => {
            i = (i + 1) % events.length;
            eventElement.innerText = events[i];
            eventElement.style.opacity = 1;
        }, 1000); // 1 second matches the CSS transition time
    }

    setInterval(updateTime, 1000);
    setInterval(cycleEvents, 10000); // Swaps every 10 seconds
    updateTime(); 
    // Initial load
    eventElement.innerText = events[0];
</script>
</body>
</html>
