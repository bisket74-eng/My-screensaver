<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambient Color-Matched Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: black; 
            margin: 0; 
            overflow: hidden; 
            color: white; 
            font-family: 'Montserrat', sans-serif;
        }
        
        .container { 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            height: 100vh; 
            padding: 20px 0;
            position: relative;
        }
        
        .banner { 
            width: 2000px; 
            height: 250px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: absolute; 
            will-change: transform; 
            text-align: center;
        }

        .fuzzy {
            mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
        }

        /* 
           BRIGHT GRADIENTS 
           Centered at 100% opacity for maximum "pop"
        */
        .time-banner {
            background: radial-gradient(circle, rgba(0, 255, 255, 1) 0%, rgba(0, 150, 255, 0.7) 35%, rgba(0, 0, 0, 0) 75%);
            color: #00ffff;
            top: 10%;
            animation: edgeBounce 24s ease-in-out infinite alternate;
        }

        .weather-banner {
            background: radial-gradient(circle, rgba(255, 160, 0, 1) 0%, rgba(255, 80, 0, 0.7) 35%, rgba(0, 0, 0, 0) 75%);
            color: #ffaa00;
            top: 40%;
            animation: edgeBounce 22s ease-in-out infinite alternate-reverse;
        }

        .upcoming-banner {
            background: radial-gradient(circle, rgba(230, 0, 255, 1) 0%, rgba(120, 0, 200, 0.7) 35%, rgba(0, 0, 0, 0) 75%);
            color: #f7a1ff;
            top: 70%;
            animation: edgeBounce 20s ease-in-out infinite alternate;
        }

        /* The Bounce: From hidden-left to hidden-right */
        @keyframes edgeBounce { 
            0% { transform: translateX(-2000px); } 
            100% { transform: translateX(100vw); } 
        }
        
        /* UNIFIED FONT & COLOR-MATCHED LABELS */
        .label { 
            font-size: 1.8rem; 
            text-transform: uppercase; 
            letter-spacing: 12px; 
            font-weight: 800; 
            display: block; 
            margin-bottom: 5px; 
            /* Heavy multi-layer shadow to create that "actual item" look */
            text-shadow: 4px 4px 12px rgba(0,0,0,1), 
                         -2px -2px 6px rgba(0,0,0,1),
                         0px 0px 25px rgba(0,0,0,1);
        }

        /* Specific label colors to match content */
        .time-banner .label { color: #00ffff; }
        .weather-banner .label { color: #ffaa00; }
        .upcoming-banner .label { color: #f7a1ff; }
        
        .content { 
            font-size: 5.5rem; 
            font-weight: 800; 
            text-shadow: 0px 0px 40px rgba(0,0,0,1), 
                         0px 0px 20px rgba(0,0,0,1);
        }

        #clock, #weather, #event { transition: opacity 0.5s ease; }
    </style>
</head>
<body>

<div class="container">
    <div class="banner time-banner fuzzy">
        <div>
            <span class="label">The Now</span>
            <div class="content" id="clock">--:--</div>
        </div>
    </div>

    <div class="banner weather-banner fuzzy">
        <div>
            <span class="label">The Weather</span>
            <div class="content" id="weather">--°F</div>
        </div>
    </div>

    <div class="banner upcoming-banner fuzzy">
        <div>
            <span class="label">The Future</span>
            <div class="content" id="event">...</div>
        </div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit'});
    }

    async function getWeather() {
        try {
            // Updated to your Vancouver, WA coordinates
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.6387&longitude=-122.6615&current_weather=true&temperature_unit=fahrenheit');
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            document.getElementById('weather').innerText = temp + "°F Vancouver";
        } catch (error) {
            document.getElementById('weather').innerText = "Offline";
        }
    }

    // Your specific events milestones
    const events = ["Cali for the 4th", "NWEF July 15", "My Camino Aug 21", "Retiring Aug 2031"];
    let i = 0;
    const eventElement = document.getElementById('event');

    function cycleEvents() {
        eventElement.style.opacity = 0;
        setTimeout(() => {
            i = (i + 1) % events.length;
            eventElement.innerText = events[i];
            eventElement.style.opacity = 1;
        }, 500);
    }

    // Intervals
    setInterval(updateTime, 1000);
    setInterval(cycleEvents, 10000); // Cycles every 10 seconds
    setInterval(getWeather, 600000); // Updates weather every 10 mins
    
    // Initial Load
    updateTime();
    getWeather();
    eventElement.innerText = events[0]; 
</script>

</body>
</html>
