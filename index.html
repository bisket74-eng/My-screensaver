<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: black; 
            margin: 0; 
            overflow: hidden; 
            color: white; 
            font-family: 'Montserrat', sans-serif;
        }
        
        .container { 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            height: 100vh; 
            padding: 20px 0;
        }
        
        .banner { 
            width: 1500px; 
            height: 220px; 
            display: flex; 
            align-items: center; 
            justify-content: center; /* This centers the text horizontally */
            /* padding: 0 60px;  <-- Removed padding to ensure perfect mathematical centering */
            position: relative; 
            will-change: transform, left, right; 
            text-align: center; /* Ensures multi-line text stays aligned */
        }

        /* Edge fading effect */
        .fuzzy {
            mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
        }

        .time-banner {
            background: radial-gradient(circle, rgba(0,229,255,0.4) 0%, rgba(0,119,190,0) 75%);
            color: #00e5ff;
            animation: flyLeft 28s ease-in-out infinite alternate;
        }

        .weather-banner {
            background: radial-gradient(circle, rgba(255,183,77,0.4) 0%, rgba(255,140,0,0) 75%);
            color: #ffb74d;
            align-self: flex-end;
            animation: flyRight 25s ease-in-out infinite alternate;
        }

        .upcoming-banner {
            background: radial-gradient(circle, rgba(225,190,231,0.4) 0%, rgba(155, 89, 182, 0) 75%);
            color: #e1bee7;
            animation: flyLeft 22s ease-in-out infinite alternate, pulse 4s infinite alternate;
        }

        #event, #weather, #clock { transition: opacity 1s ease-in-out; }

        @keyframes flyLeft { 
            from { left: -900px; } 
            to { left: 100vw; } 
        }

        @keyframes flyRight { 
            from { right: -900px; } 
            to { right: 100vw; } 
        }
        
        @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }

        .label { 
            font-size: 1.8rem; 
            text-transform: uppercase; 
            letter-spacing: 8px; 
            font-weight: 400; 
            opacity: 0.7; 
            display: block; 
            margin-bottom: 5px; 
        }
        
        .content { 
            font-size: 4.5rem; 
            text-shadow: 0px 0px 30px rgba(0,0,0,0.5); 
            line-height: 1.1; 
            font-weight: 800; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="banner time-banner fuzzy">
        <div>
            <span class="label">The Now</span>
            <div class="content" id="clock">00:00</div>
        </div>
    </div>

    <div class="banner weather-banner fuzzy">
        <div>
            <span class="label">The Weather</span>
            <div class="content" id="weather">--°F</div>
        </div>
    </div>

    <div class="banner upcoming-banner fuzzy">
        <div>
            <span class="label">The Future</span>
            <div class="content" id="event">...</div>
        </div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit'});
    }

    async function getWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.6387&longitude=-122.6615&current_weather=true&temperature_unit=fahrenheit');
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            const weatherEl = document.getElementById('weather');
            weatherEl.style.opacity = 0;
            setTimeout(() => {
                weatherEl.innerText = temp + "°F Vancouver";
                weatherEl.style.opacity = 1;
            }, 1000);
        } catch (error) {
            document.getElementById('weather').innerText = "Offline";
        }
    }

    const events = ["My Camino Aug 21", "Cali for the 4th", "Retiring Aug 2031"];
    let i = 0;
    const eventElement = document.getElementById('event');

    function cycleEvents() {
        eventElement.style.opacity = 0;
        setTimeout(() => {
            i = (i + 1) % events.length;
            eventElement.innerText = events[i];
            eventElement.style.opacity = 1;
        }, 1000);
    }

    // Intervals
    setInterval(updateTime, 1000);
    setInterval(cycleEvents, 10000);
    setInterval(getWeather, 600000); 
    
    // Init
    updateTime();
    getWeather();
    eventElement.innerText = events[0]; 
</script>

</body>
</html>
