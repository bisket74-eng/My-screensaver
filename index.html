<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: black; margin: 0; overflow: hidden; color: white; }
        .container { display: flex; flex-direction: column; justify-content: space-around; height: 100vh; }
        
        .banner { 
            width: 900px; /* Slightly wider to accommodate the much larger text */
            height: 220px; /* Slightly taller to fit the larger fonts */
            display: flex; 
            align-items: center; 
            padding: 0 60px; 
            position: relative; 
            will-change: transform, left, right; 
        }

        .fuzzy {
            mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
        }

        .time-banner {
            background: radial-gradient(circle, rgba(0,119,190,0.8) 0%, rgba(0,119,190,0) 85%);
            font-family: 'Montserrat', sans-serif; 
            color: #00e5ff;
            animation: flyLeft 28s ease-in-out infinite alternate;
        }

        .weather-banner {
            background: radial-gradient(circle, rgba(255,140,0,0.8) 0%, rgba(255,140,0,0) 85%);
            font-family: 'Montserrat', sans-serif; 
            color: #ffb74d;
            align-self: flex-end;
            animation: flyRight 25s ease-in-out infinite alternate;
        }

        .upcoming-banner {
            background: radial-gradient(circle, rgba(155, 89, 182, 0.8) 0%, rgba(155, 89, 182, 0) 85%);
            font-family: 'Montserrat', sans-serif;
            color: #e1bee7;
            animation: flyLeft 22s ease-in-out infinite alternate, pulse 4s infinite alternate;
        }

        #event { transition: opacity 1s ease-in-out; opacity: 1; }

        @keyframes flyLeft { 
            from { left: -850px; } 
            to { left: calc(100vw - 50px); } 
        }

        @keyframes flyRight { 
            from { right: -850px; } 
            to { right: calc(100vw - 50px); } 
        }
        
        @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }

        /* Label size set to 2rem and content size set to 4rem */
        .label { 
            font-size: 2rem; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            font-weight: 200; 
            opacity: 0.8; 
            display: block; 
            margin-bottom: 10px; 
        }
        .content { 
            font-size: 4rem; 
            text-shadow: 2px 2px 25px rgba(0,0,0,0.9); 
            line-height: 1.1; 
            font-weight: 400; 
        }
    </style>
</head>
<body>
<div class="container">
    <div class="banner time-banner fuzzy">
        <div><span class="label">The Now</span><div class="content" id="clock">00:00:00</div></div>
    </div>
    <div class="banner weather-banner fuzzy">
        <div><span class="label">The Weather</span><div class="content" id="weather">Loading...</div></div>
    </div>
    <div class="banner upcoming-banner fuzzy">
        <div><span class="label">kThe Future</span><div class="content" id="event">Loading Schedule...</div></div>
    </div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit'});
    }

    async function getWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.6387&longitude=-122.6615&current_weather=true&temperature_unit=fahrenheit');
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            document.getElementById('weather').innerText = temp + "°F - Vancouver";
        } catch (error) {
            document.getElementById('weather').innerText = "Weather Unavailable";
        }
    }

    const events = ["My Camino Aug 21", "Cali for the 4th", "Retiring Aug 2031"];
    let i = 0;
    const eventElement = document.getElementById('event');

    function cycleEvents() {
        eventElement.style.opacity = 0;
        setTimeout(() => {
            i = (i + 1) % events.length;
            eventElement.innerText = events[i];
            eventElement.style.opacity = 1;
        }, 1000);
    }

    setInterval(updateTime, 1000);
    setInterval(cycleEvents, 10000);
    setInterval(getWeather, 600000); 
    
    updateTime();
    getWeather();
    eventElement.innerText = events[0]; 
</script>
</body>
</html>
