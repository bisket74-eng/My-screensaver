<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body { background: black; margin: 0; overflow: hidden; color: white; }
        
        .container { 
            display: flex; 
            flex-direction: column; 
            justify-content: space-around; 
            height: 100vh; 
        }
        
        .banner { 
            width: 1200px; 
            height: 250px; 
            display: flex; 
            align-items: center; 
            padding: 0 60px; 
            position: absolute; /* Changed to absolute for smoother lane reset */
            will-change: transform;
            left: -1300px; /* Start position */
        }

        .fuzzy {
            mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 15%, rgba(0,0,0,1) 85%, rgba(0,0,0,0) 100%);
        }

        /* --- Slower, Single-Direction Motion --- */
        .time-banner {
            background: radial-gradient(circle, rgba(0,119,190,0.9) 0%, rgba(0,119,190,0) 85%);
            font-family: 'Montserrat', sans-serif; 
            color: #00e5ff;
            animation: flyAcross 35s linear infinite;
            top: 5vh; /* Initial Lane */
        }
        .time-banner .content { font-size: 9rem; } 

        .weather-banner {
            background: radial-gradient(circle, rgba(255,140,0,0.7) 0%, rgba(255,140,0,0) 85%);
            font-family: 'Montserrat', sans-serif; 
            color: #ffb74d;
            animation: flyAcross 30s linear infinite;
            top: 38vh;
        }

        .upcoming-banner {
            background: radial-gradient(circle, rgba(155, 89, 182, 0.7) 0%, rgba(155, 89, 182, 0) 85%);
            font-family: 'Montserrat', sans-serif;
            color: #e1bee7;
            animation: flyAcross 40s linear infinite;
            top: 70vh;
        }

        @keyframes flyAcross { 
            from { transform: translateX(0); } 
            to { transform: translateX(calc(100vw + 1400px)); } 
        }

        .label { 
            font-size: 1.8rem; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            font-weight: 800; 
            opacity: 0.7; 
            display: block; 
            margin-bottom: 5px; 
        }
        
        .content { 
            font-size: 4rem; 
            text-shadow: 2px 2px 25px rgba(0,0,0,0.9); 
            line-height: 1.1; 
            font-weight: 800; 
            white-space: nowrap;
            transition: opacity 1.5s ease-in-out; 
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div class="banner time-banner fuzzy" id="time-slot">
        <div><span class="label">Current Time</span><div class="content" id="clock">0:00</div></div>
    </div>
    <div class="banner weather-banner fuzzy" id="weather-slot">
        <div><span class="label">Vancouver, WA</span><div class="content" id="weather">Loading...</div></div>
    </div>
    <div class="banner upcoming-banner fuzzy" id="event-slot">
        <div><span class="label">Calendar Feed</span><div class="content" id="event">My Camino Aug 21</div></div>
    </div>
</div>

<script>
    // --- Clock Correction: Numeric Hour, No Seconds ---
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit'});
    }

    // --- Weather ---
    async function getWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=45.6387&longitude=-122.6615&current_weather=true&temperature_unit=fahrenheit');
            const data = await response.json();
            const temp = Math.round(data.current_weather.temperature);
            document.getElementById('weather').innerText = temp + "°F - Vancouver";
        } catch (error) {
            document.getElementById('weather').innerText = "Weather Unavailable";
        }
    }

    // --- Updated Event Text ---
    const events = ["My Camino Aug 21", "Callie for the 4th", "Retiring August 2031"];
    let eventIdx = 0;
    function cycleEvents() {
        const el = document.getElementById('event');
        el.style.opacity = 0;
        setTimeout(() => {
            eventIdx = (eventIdx + 1) % events.length;
            el.innerText = events[eventIdx];
            el.style.opacity = 1;
        }, 1500);
    }

    // --- Seamless Lane Swapping Logic ---
    const lanes = ["5vh", "38vh", "70vh"];
    let currentLaneIdx = 0;
    const timeBanner = document.getElementById('time-slot');
    const weatherBanner = document.getElementById('weather-slot');
    const eventBanner = document.getElementById('event-slot');

    // Every time the time banner finishes its trip (goes off screen on the right)
    timeBanner.addEventListener('animationiteration', () => {
        // Move to the next lane
        currentLaneIdx = (currentLaneIdx + 1) % lanes.length;
        
        // Assign lanes to each banner so they don't overlap
        timeBanner.style.top = lanes[currentLaneIdx];
        weatherBanner.style.top = lanes[(currentLaneIdx + 1) % 3];
        eventBanner.style.top = lanes[(currentLaneIdx + 2) % 3];
    });

    setInterval(updateTime, 1000);
    setInterval(cycleEvents, 12000); 
    setInterval(getWeather, 600000); 
    
    updateTime();
    getWeather();
</script>

</body>
</html>
